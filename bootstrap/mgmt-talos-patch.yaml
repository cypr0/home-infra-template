machine:
  install:
    disk: /dev/sda
    image: factory.talos.dev/nocloud-installer/${TALOS_INSTALLER_HASH}:${TALOS_VERSION}
  network:
    nameservers:
      - ${MGMT_DNS}
      - 1.1.1.1
      - 9.9.9.9
    interfaces:
      # deviceSelector matches the first virtio_net device — robust against
      # eth0/ens18/enp1s0 naming differences across Talos versions.
      - deviceSelector:
          driver: virtio_net
        addresses:
          - ${MGMT_NODE_IP}/${MGMT_SUBNET_PREFIX}
        routes:
          - network: 0.0.0.0/0
            gateway: ${MGMT_GATEWAY}
        dhcp: false
        vip:
          ip: ${MGMT_VIP}
  # OPNsense ntpd on the LAN bridge — central NTP source for all clusters.
  time:
    servers:
      - ${MGMT_GATEWAY}
  kubelet:
    extraArgs:
      rotate-server-certificates: true

cluster:
  allowSchedulingOnControlPlanes: true
  network:
    cni:
      name: none
  proxy:
    disabled: true
  discovery:
    enabled: true
    registries:
      service:
        disabled: true
  # externalCloudProvider intentionally NOT enabled here —
  # the mgmt cluster has no Proxmox CCM that would set the NodeIP.
  # With enabled:true kubelet would wait for cloud-provider=external and
  # the node would carry the uninitialized taint that is never removed.
  # CCM is only relevant for the workload cluster (home-cluster).
