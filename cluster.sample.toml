# ╭──────────────────────────────────────────────────────────────────────────╮
# │ Example Cluster Configuration - CAPMOX Home Lab                          │
# │                                                                          │
# │ Copy this file to cluster.toml and fill in your actual values.           │
# │ This defines the INFRASTRUCTURE only - apps deployed separately.         │
# ╰──────────────────────────────────────────────────────────────────────────╯

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# INFRASTRUCTURE - Required for VM creation and cluster bootstrap
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[proxmox]
# Proxmox API endpoint and credentials
api_url = "https://10.0.1.100:8006/api2/json"
node = "pve-node1"              # Proxmox node name where VMs will be created
user = "root@pam"               # User for CAPI (needs VM.* permissions)
token = ""                      # API token secret (create in Proxmox UI)
storage = "local-zfs"           # Storage pool for VM disks
bridge = "vmbr0"                # Network bridge

[network]
# Network configuration for all Kubernetes nodes
lan_cidr = "10.0.50.0/24"      # LAN network (all nodes on this network)
dns_servers = ["1.1.1.1", "9.9.9.9"]
ntp_servers = ["time.cloudflare.com"]
# default_gateway = "10.0.50.1"  # Auto-calculated from lan_cidr

[kubernetes]
# Kubernetes cluster network settings (internal)
pod_cidr = "10.244.0.0/16"     # Internal pod network
svc_cidr = "10.245.0.0/16"     # Internal service network

[kubernetes.api]
# Virtual IP for kube-apiserver (must be in lan_cidr range)
# This is the API endpoint for kubectl/helm/etc.
addr = "10.0.50.10"
tls_sans = []                   # Additional SANs for API cert (optional)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MANAGEMENT NODE - Single node that runs CAPI/CAPMOX
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[mgmt_nodes]]
name = "k8s-mgmt"
address = "10.0.50.20"
mac_addr = "52:54:00:12:34:00"
# Talos schematic from factory.talos.dev (with your extensions)
# Generate yours at: https://factory.talos.dev
schematic_id = "ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515"
cores = 4
memory = 8192                   # 8 GB
disk_size = 100                 # GB

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CONTROL PLANE NODES - HA requires 3 static nodes
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[controlplane_nodes]]
name = "k8s-cp-01"
address = "10.0.50.21"
mac_addr = "52:54:00:12:34:01"
schematic_id = "ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515"
cores = 4
memory = 16384                  # 16 GB (enough for etcd + workloads)
disk_size = 100

[[controlplane_nodes]]
name = "k8s-cp-02"
address = "10.0.50.22"
mac_addr = "52:54:00:12:34:02"
schematic_id = "ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515"
cores = 4
memory = 16384
disk_size = 100

[[controlplane_nodes]]
name = "k8s-cp-03"
address = "10.0.50.23"
mac_addr = "52:54:00:12:34:03"
schematic_id = "ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515"
cores = 4
memory = 16384
disk_size = 100

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AUTOSCALER - Dynamic worker scaling (recommended)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Control planes handle workloads initially. When more resources are needed,
# CAPMOX automatically creates additional worker nodes on demand.

[autoscaler]
enabled = true
min_workers = 0                 # No permanent workers (save resources!)
max_workers = 4                 # Scale up to 4 workers when needed
initial_replicas = 0            # Start with 0 workers

[autoscaler.worker_template]
# Template configuration for dynamically created workers
# CAPMOX will clone this template when scaling up
cores = 4
memory = 12288                  # 12 GB
disk_size = 100
schematic_id = "ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# STATIC WORKERS (optional) - Only if you want permanent workers
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Uncomment if you want workers that are always running (not autoscaled)
# You can combine static + autoscaled workers (e.g., 1 static + 3 dynamic)
#
# Use cases for static workers:
# - Guaranteed capacity for critical workloads
# - Storage nodes (Longhorn, Ceph)
# - Database nodes requiring persistent volumes

