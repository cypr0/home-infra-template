# ADVANCED CONFIGURATION (optional)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# The following sections are optional and only needed for specific features.
# Most users can leave these commented out.

# ─── OPNsense Firewall Automation ────────────────────────────────────────────
# Enable if you want automatic firewall rule creation via OPNsense API
# Requires OPNsense firewall with API access configured

# [opnsense]
# api_url = "https://10.0.1.1"
# api_key = ""                    # Create in OPNsense: System > Access > Users > API keys
# api_secret = ""

# ─── LoadBalancer IP Ranges ──────────────────────────────────────────────────
# Required if you want LoadBalancer-type services (Ingress, etc.)
# These IPs are used by Cilium for L2 announcements
# IPs must be in your lan_cidr range and NOT used by DHCP!

# [gateways]
# external = "10.0.50.100"        # For public ingress (traefik, nginx, etc.)
# internal = "10.0.50.101"        # For internal services (optional)

# ─── Cilium BGP (Advanced Networking) ────────────────────────────────────────
# Only needed if you want BGP-based LoadBalancer IP advertisement
# Alternative to L2 announcements, requires BGP-capable router

# [cilium]
# bgp_enabled = false
# [cilium.bgp]
# router_addr = "10.0.50.1"       # Your BGP router IP
# router_asn = "65000"            # Router's BGP AS number
# node_asn = "65001"              # Kubernetes nodes' BGP AS number
